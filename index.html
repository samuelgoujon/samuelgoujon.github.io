      --text: #e8e6e0;
      --muted: #6b6f7a;
      --accent: #ffffff;

      --tag-oss-text: #6dbb8a;
      --tag-hw: #1a1f34;
      --tag-hw-text: #7a9fd4;
      --tag-cn: #2e1a1a;
      --tag-cn-text: #d46a6a;
      --tag-ru: #1a1e2e;
      --tag-ru-text: #6a8ad4;
      --tag-fr: #1a2220;
      --tag-fr-text: #6ab8a0;
      --radius: 6px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 3.5rem 2rem 2.5rem;
      text-align: center;
      position: relative;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 80% at 50% -10%, #1e1a12 0%, transparent 70%);
      pointer-events: none;
    }
    h1 {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #ffffff;
      position: relative;
    }
    .subtitle {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 0.4rem;
      font-family: 'DM Mono', monospace;
      position: relative;
    }

        .social-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 1.4rem;
      position: relative;
    }
    .social-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      padding: 8px;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .social-btn:hover { color: var(--accent); border-color: var(--accent); }
    .social-btn svg { width: 16px; height: 16px; flex-shrink: 0; display: block; }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1.8rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .filter-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-right: 4px;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 5px 13px;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn[data-tag="CN"].active  { background: var(--tag-cn-text);  border-color: var(--tag-cn-text);  color: #0d0e10; }
    .filter-btn[data-tag="RU"].active  { background: var(--tag-ru-text);  border-color: var(--tag-ru-text);  color: #0d0e10; }
    .filter-btn[data-tag="FR"].active  { background: var(--tag-fr-text);  border-color: var(--tag-fr-text);  color: #0d0e10; }
    .filter-btn[data-tag="Open-source"].active { background: var(--tag-oss-text); border-color: var(--tag-oss-text); color: #0d0e10; }
    .filter-btn[data-tag="Huawei AppGallery"].active { background: var(--tag-hw-text); border-color: var(--tag-hw-text); color: #0d0e10; }
    .filter-btn#reset-btn { margin-left: auto; }

    .search-wrap { margin-bottom: 1.6rem; }
    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 9px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--accent); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: 0 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    thead th:first-child { padding-left: 0; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:hover { background: var(--surface); }
    tbody tr.hidden { display: none; }
    td { padding: 12px 14px; vertical-align: middle; }
    td:first-child { padding-left: 0; font-weight: 500; color: #ffffff; font-size: 14px; width: 160px; }
    td:nth-child(2) { font-family: 'DM Mono', monospace; font-size: 12px; width: 220px; }
    td:nth-child(3) { font-size: 13px; color: var(--muted); }
    td:last-child   { width: 220px; }
    td a { color: #3498dc; text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.15s; }
    td a:hover { border-bottom-color: #3498dc; }

    .tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .tag {
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      padding: 2px 7px;
    }
    .tag-CN  { background: var(--tag-cn);  color: var(--tag-cn-text); }
    .tag-RU  { background: var(--tag-ru);  color: var(--tag-ru-text); }
    .tag-FR  { background: var(--tag-fr);  color: var(--tag-fr-text); }
    .tag-OSS { background: var(--tag-oss); color: var(--tag-oss-text); }
    .tag-HW  { background: var(--tag-hw);  color: var(--tag-hw-text); }

    #empty { text-align: center; padding: 3rem 0; color: var(--muted); font-size: 14px; display: none; }
    .counter { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 1rem; }

    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 1.5rem;
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: #ffffff; }

</head>

const TAG_META = {
  "CN":                { cls: "tag-CN",  label: "CN" },
  "RU":                { cls: "tag-RU",  label: "RU" },
  "FR":                { cls: "tag-FR",  label: "FR" },
  "Open-source":       { cls: "tag-OSS", label: "Open-source" },
  "Huawei AppGallery": { cls: "tag-HW",  label: "Huawei AppGallery" },
};

let activeTag = null;

const tbody   = document.getElementById("tbody");
const search  = document.getElementById("search");
const counter = document.getElementById("counter");
const emptyEl = document.getElementById("empty");

function render() {
  tbody.innerHTML = "";
  data.forEach((item) => {
    const tr = document.createElement("tr");
    tr.dataset.tags = JSON.stringify(item.tags);
    tr.dataset.name = item.name.toLowerCase();
    tr.dataset.desc = (item.desc || "").toLowerCase();
    const tagsHtml = item.tags.map(t => {
      const m = TAG_META[t] || { cls: "", label: t };
      return `<span class="tag ${m.cls}">${m.label}</span>`;
    }).join("");
    tr.innerHTML = `
      <td>${item.name}</td>
      <td><a href="${item.url}" target="_blank" rel="noopener">${item.url}</a></td>
      <td>${item.desc || ""}</td>
      <td><div class="tags">${tagsHtml}</div></td>
    `;
    tbody.appendChild(tr);
  });
  filterRows();
}

function filterRows() {
  const q = search.value.trim().toLowerCase();
  let visible = 0;
  document.querySelectorAll("#tbody tr").forEach(tr => {
    const tags = JSON.parse(tr.dataset.tags);
    const matchTag    = !activeTag || tags.includes(activeTag);
    const matchSearch = !q || tr.dataset.name.includes(q) ||
      tr.dataset.desc.includes(q) ||
      (tr.querySelector("a")?.href || "").toLowerCase().includes(q);
    if (matchTag && matchSearch) { tr.classList.remove("hidden"); visible++; }
    else { tr.classList.add("hidden"); }
  });
  counter.textContent = `${visible} tool${visible !== 1 ? "s" : ""}`;
  emptyEl.style.display = visible === 0 ? "block" : "none";
}

document.querySelectorAll(".filter-btn[data-tag]").forEach(btn => {
  btn.addEventListener("click", () => {
    const tag = btn.dataset.tag;
    if (activeTag === tag) {
      activeTag = null;
      btn.classList.remove("active");
    } else {
      activeTag = tag;
      document.querySelectorAll(".filter-btn[data-tag]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }
    filterRows();
  });
});

document.getElementById("reset-btn").addEventListener("click", () => {
  activeTag = null;
  search.value = "";
  document.querySelectorAll(".filter-btn[data-tag]").forEach(b => b.classList.remove("active"));
  filterRows();
});

search.addEventListener("input", filterRows);
render();
</script>
